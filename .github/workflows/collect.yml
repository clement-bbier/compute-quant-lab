name: collect-gpu-prices

# Collecte horaire des prix GPU (Vast.ai + RunPod) sur les serveurs GitHub :
# tourne PC eteint, gratuit. Accumule les snapshots sur la branche dediee
# `data-snapshots` (la branche `main` reste propre).
#
# Prerequis (cote utilisateur, une fois) : ajouter les 2 secrets dans
# Settings -> Secrets and variables -> Actions :
#   VASTAI_API_KEY, RUNPOD_API_KEY

on:
  schedule:
    - cron: "17 * * * *" # ~ toutes les heures a :17 UTC (GitHub peut decaler)
  workflow_dispatch: {} # declenchable a la main (onglet Actions)

permissions:
  contents: write

concurrency:
  group: collect-gpu-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branche data-snapshots = code + historique accumule)
        uses: actions/checkout@v4
        with:
          ref: data-snapshots
          fetch-depth: 1

      - name: Setup uv + Python
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install deps
        run: uv sync

      - name: Collecte prix GPU (Vast.ai + RunPod)
        env:
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: uv run python -m infra.collectors.gpu_price_snapshot

      - name: Commit & push des snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/snapshots
          if git diff --staged --quiet; then
            echo "Aucune nouvelle donnee a committer."
          else
            git commit -m "data: snapshot $(date -u +%FT%TZ) [skip ci]"
            git push origin HEAD:data-snapshots
          fi
