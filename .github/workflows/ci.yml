name: ci
on: [push, pull_request]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build des noyaux Rust (maturin develop)
        run: |
          uv run maturin develop -m core/pricing/_kernel/Cargo.toml
          uv run maturin develop -m core/backtest/_loop/Cargo.toml
          uv run maturin develop -m projects/04_compute_index_curve/forward_engine/Cargo.toml
      - run: uv run ruff check .
      - run: uv run mypy core
      - name: Tests (chaque module en isolation — conftest non partagé entre projets)
        run: |
          for d in tests core/backtest/tests core/features/tests core/models/tests core/storage/tests projects/*/tests; do
            echo "== pytest $d ==" ; uv run pytest -q "$d" ; done
